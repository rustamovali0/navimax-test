<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NaviMax QA Checklist - Supabase</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .header h1 i {
            color: #4f8cf7;
            margin-right: 10px;
        }
        .header .subtitle {
            color: #6a6a82;
            font-size: 13px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            padding: 6px 14px;
            gap: 10px;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #e8e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            width: 200px;
        }
        .search-box input::placeholder {
            color: #6a6a82;
        }
        .search-box i {
            color: #6a6a82;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid #2a2a3e;
            background: #0a0a0f;
            color: #e8e8f0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            background: #1a1a2e;
            border-color: #4f8cf7;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f8cf7, #7c3aed);
            border: none;
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 140, 247, 0.3);
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            padding: 12px 16px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 24px;
            font-weight: 700;
        }
        .stat-box .label {
            font-size: 11px;
            color: #6a6a82;
            margin-top: 2px;
        }
        .stat-box .num.green {
            color: #10b981;
        }
        .stat-box .num.red {
            color: #ef4444;
        }
        .stat-box .num.yellow {
            color: #f59e0b;
        }
        .stat-box .num.purple {
            color: #7c3aed;
        }
        .stat-box .num.blue {
            color: #4f8cf7;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            align-items: center;
        }
        .category-filter .filter-label {
            color: #6a6a82;
            font-size: 13px;
            font-weight: 600;
            margin-right: 8px;
        }
        .category-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3e;
            background: #0a0a0f;
            color: #6a6a82;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            white-space: nowrap;
        }
        .category-btn:hover {
            background: #1a1a2e;
            border-color: #4f8cf7;
            color: #e8e8f0;
        }
        .category-btn.active {
            background: linear-gradient(135deg, #4f8cf7, #7c3aed);
            border-color: #4f8cf7;
            color: #fff;
        }
        .category-btn .count {
            background: rgba(255, 255, 255, 0.1);
            padding: 0 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 4px;
        }
        .category-btn.active .count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Table */
        .table-wrap {
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #0a0a0f;
        }
        thead th {
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: #6a6a82;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #2a2a3e;
        }

        tbody tr {
            border-bottom: 1px solid #1a1a2e;
            transition: 0.2s;
        }
        tbody tr:hover {
            background: #1a1a2e;
        }
        tbody td {
            padding: 10px 14px;
            vertical-align: middle;
        }

        /* Custom Checkbox */
        .checkbox-custom {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .checkbox-custom input {
            display: none;
        }
        .checkbox-custom .checkmark {
            width: 20px;
            height: 20px;
            border: 2px solid #3a3a4e;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .checkbox-custom .checkmark i {
            font-size: 12px;
            color: #fff;
            opacity: 0;
            transform: scale(0);
            transition: 0.2s;
        }
        .checkbox-custom input:checked+.checkmark {
            background: #4f8cf7;
            border-color: #4f8cf7;
        }
        .checkbox-custom input:checked+.checkmark i {
            opacity: 1;
            transform: scale(1);
        }

        .tc-id {
            font-weight: 600;
            color: #4f8cf7;
            font-size: 12px;
        }
        .tc-title {
            font-weight: 500;
        }
        .tc-title small {
            display: block;
            color: #6a6a82;
            font-weight: 400;
            font-size: 12px;
            margin-top: 2px;
            max-width: 350px;
        }
        .tc-category {
            font-size: 11px;
            color: #6a6a82;
            background: #0a0a0f;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid #2a2a3e;
        }

        /* Badges */
        .badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .badge.passed {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .badge.failed {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .badge.blocked {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }
        .badge.retest {
            background: rgba(124, 58, 237, 0.15);
            color: #7c3aed;
        }
        .badge.not-tested {
            background: rgba(106, 106, 130, 0.15);
            color: #6a6a82;
        }

        .badge.critical {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .badge.high {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        .badge.medium {
            background: rgba(79, 140, 247, 0.2);
            color: #4f8cf7;
        }
        .badge.low {
            background: rgba(106, 106, 130, 0.2);
            color: #6a6a82;
        }

        .td-select {
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #e8e8f0;
            padding: 4px 10px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            min-width: 110px;
        }
        .td-select:focus {
            outline: none;
            border-color: #4f8cf7;
        }
        .td-select option {
            background: #12121a;
            color: #e8e8f0;
        }

        .td-select-priority {
            min-width: 90px;
        }
        .td-select-priority.critical {
            border-color: #ef4444;
        }
        .td-select-priority.high {
            border-color: #f59e0b;
        }
        .td-select-priority.medium {
            border-color: #4f8cf7;
        }
        .td-select-priority.low {
            border-color: #6a6a82;
        }

        .bug-input {
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #e8e8f0;
            padding: 4px 10px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            width: 90px;
            transition: 0.2s;
        }
        .bug-input:focus {
            outline: none;
            border-color: #4f8cf7;
        }
        .bug-input::placeholder {
            color: #4a4a5e;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #6a6a82;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .btn-delete:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6a6a82;
        }
        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6a6a82;
        }
        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 20px;
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            min-width: 280px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .toast.success i {
            color: #10b981;
        }
        .toast.error i {
            color: #ef4444;
        }
        .toast.info i {
            color: #4f8cf7;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .toast.hide {
            animation: slideOut 0.3s ease forwards;
        }
        @keyframes slideOut {
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #12121a;
            border: 1px solid #2a2a3e;
            border-radius: 14px;
            padding: 28px;
            max-width: 520px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                transform: scale(0.95) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .modal-close {
            background: transparent;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            color: #6a6a82;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .modal-close:hover {
            background: #1a1a2e;
            color: #fff;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #6a6a82;
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            color: #e8e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4f8cf7;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #1a1a2e;
        }
        .form-actions button {
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .btn-secondary {
            background: #0a0a0f;
            color: #6a6a82;
            border: 1px solid #2a2a3e;
        }
        .btn-secondary:hover {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-primary-modal {
            background: linear-gradient(135deg, #4f8cf7, #7c3aed);
            border: none;
            color: #fff;
        }
        .btn-primary-modal:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 140, 247, 0.3);
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                flex-direction: column;
            }
            .search-box input {
                width: 100%;
            }
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
            .category-filter {
                flex-wrap: wrap;
            }
            .category-btn {
                font-size: 11px;
                padding: 4px 10px;
            }
            table {
                font-size: 12px;
            }
            thead th,
            tbody td {
                padding: 6px 8px;
            }
            .td-select {
                min-width: 80px;
                font-size: 11px;
                padding: 2px 6px;
            }
            .bug-input {
                width: 60px;
                font-size: 11px;
                padding: 2px 6px;
            }
            .tc-title small {
                max-width: 150px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <div>
                <h1><i class="fas fa-clipboard-check"></i> NaviMax QA Checklist</h1>
                <div class="subtitle">Supabase ilə canlı test case idarəsi</div>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Axtar..." />
                </div>
                <button class="btn btn-primary" id="addBtn">
                    <i class="fas fa-plus"></i> Yeni Test
                </button>
                <button class="btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-box"><div class="num blue" id="total">0</div><div class="label">📋 Ümumi</div></div>
            <div class="stat-box"><div class="num green" id="passed">0</div><div class="label">✅ Keçdi</div></div>
            <div class="stat-box"><div class="num red" id="failed">0</div><div class="label">❌ Uğursuz</div></div>
            <div class="stat-box"><div class="num yellow" id="blocked">0</div><div class="label">🚫 Bloklanıb</div></div>
            <div class="stat-box"><div class="num purple" id="retest">0</div><div class="label">🔄 Retest</div></div>
            <div class="stat-box"><div class="num" id="notTested" style="color:#6a6a82;">0</div><div class="label">⏳ Edilməyib</div></div>
        </div>

        <!-- Category Filter -->
        <div class="category-filter" id="categoryFilter">
            <span class="filter-label"><i class="fas fa-tags"></i> Kateqoriya:</span>
            <button class="category-btn active" data-category="all">Hamısı <span class="count" id="countAll">0</span></button>
            <!-- Dynamic categories -->
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px;"></th>
                        <th style="width:70px;">ID</th>
                        <th>Test Case</th>
                        <th style="width:140px;">Status</th>
                        <th style="width:120px;">Prioritet</th>
                        <th style="width:100px;">Bug ID</th>
                        <th style="width:50px;"></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="7">
                            <div class="loading">
                                <i class="fas fa-spinner"></i>
                                <p>Məlumatlar yüklənir...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Yeni Test Case</h2>
                <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            </div>
            <form id="modalForm">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label>Başlıq *</label>
                    <input type="text" id="formTitle" placeholder="Test case başlığı" required />
                </div>
                <div class="form-group">
                    <label>Təsvir</label>
                    <textarea id="formDesc" placeholder="Qısa təsvir" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="formStatus">
                            <option value="not-tested">⏳ Test edilməyib</option>
                            <option value="passed">✅ Keçdi</option>
                            <option value="failed">❌ Uğursuz</option>
                            <option value="blocked">🚫 Bloklanıb</option>
                            <option value="retest">🔄 Retest</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Prioritet</label>
                        <select id="formPriority">
                            <option value="critical">🔴 Critical</option>
                            <option value="high">🟠 High</option>
                            <option value="medium" selected>🔵 Medium</option>
                            <option value="low">⚪ Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kateqoriya</label>
                    <select id="formCategory">
                        <option value="Login / Register">🔐 Login / Register</option>
                        <option value="Ana səhifə">🏠 Ana səhifə</option>
                        <option value="Xəritə">🗺️ Xəritə</option>
                        <option value="Obyektlər">📦 Obyektlər</option>
                        <option value="Tarixçə">📜 Tarixçə</option>
                        <option value="Maşın İzləmə">🚗 Maşın İzləmə</option>
                        <option value="Bildirişlər">🔔 Bildirişlər</option>
                        <option value="Kart">💳 Kart</option>
                        <option value="Balans">💰 Balans</option>
                        <option value="Logout">🚪 Logout</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bug ID</label>
                    <input type="text" id="formBug" placeholder="Məs: BUG-123" />
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="modalCancel">Ləğv et</button>
                    <button type="submit" class="btn-primary-modal" id="modalSubmit">Yadda saxla</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // SUPABASE KONFİQURASİYA
        // ============================================================
        const SUPABASE_URL = 'https://vqdzohcztqztnsqbptfm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vHOZFaQlWoJ1epmGcfB9lw_Zn2v27v2';

        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // STATE
        // ============================================================
        let testCases = [];
        let isLoading = false;
        let selectedCategory = 'all';

        // ============================================================
        // CATEGORIES (SABİT)
        // ============================================================
        const categories = [
            { id: 'Login / Register', icon: '🔐', label: 'Login / Register' },
            { id: 'Ana səhifə', icon: '🏠', label: 'Ana səhifə' },
            { id: 'Xəritə', icon: '🗺️', label: 'Xəritə' },
            { id: 'Obyektlər', icon: '📦', label: 'Obyektlər' },
            { id: 'Tarixçə', icon: '📜', label: 'Tarixçə' },
            { id: 'Maşın İzləmə', icon: '🚗', label: 'Maşın İzləmə' },
            { id: 'Bildirişlər', icon: '🔔', label: 'Bildirişlər' },
            { id: 'Kart', icon: '💳', label: 'Kart' },
            { id: 'Balans', icon: '💰', label: 'Balans' },
            { id: 'Logout', icon: '🚪', label: 'Logout' }
        ];

        // ============================================================
        // CRUD FUNCTIONS
        // ============================================================

        async function loadTestCases() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('tableBody').innerHTML = `
                <tr><td colspan="7">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>Məlumatlar yüklənir...</p>
                    </div>
                </td></tr>
            `;

            try {
                const { data, error } = await supabase
                    .from('qa_test_cases')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                testCases = data || [];
                renderCategories();
                render();
                showToast('Uğurlu', `${testCases.length} test case yükləndi`, 'success');
            } catch (error) {
                console.error('Load error:', error);
                showToast('Xəta', 'Məlumatlar yüklənərkən xəta baş verdi', 'error');
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="7">
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Xəta baş verdi</h3>
                            <p>${error.message}</p>
                        </div>
                    </td></tr>
                `;
            } finally {
                isLoading = false;
            }
        }

        async function addTestCase(data) {
            try {
                const maxNum = testCases.reduce((max, t) => {
                    const num = parseInt(t.tc_id.replace('TC-', ''));
                    return num > max ? num : max;
                }, 0);
                const tcId = `TC-${String(maxNum + 1).padStart(3, '0')}`;

                const { data: inserted, error } = await supabase
                    .from('qa_test_cases')
                    .insert([{
                        tc_id: tcId,
                        title: data.title,
                        description: data.description || '',
                        category: data.category || 'Digər',
                        status: data.status || 'not-tested',
                        priority: data.priority || 'medium',
                        bug_id: data.bug || null
                    }])
                    .select()
                    .single();

                if (error) throw error;

                testCases.unshift(inserted);
                renderCategories();
                render();
                showToast('Uğurlu', `"${data.title}" əlavə edildi`, 'success');
                return inserted;
            } catch (error) {
                console.error('Add error:', error);
                showToast('Xəta', 'Əlavə edərkən xəta baş verdi', 'error');
                throw error;
            }
        }

        async function updateTestCase(id, updates) {
            try {
                const { data, error } = await supabase
                    .from('qa_test_cases')
                    .update(updates)
                    .eq('id', id)
                    .select()
                    .single();

                if (error) throw error;

                const index = testCases.findIndex(t => t.id === id);
                if (index !== -1) {
                    testCases[index] = data;
                }
                renderCategories();
                render();
                showToast('Uğurlu', 'Test case yeniləndi', 'success');
                return data;
            } catch (error) {
                console.error('Update error:', error);
                showToast('Xəta', 'Yeniləyərkən xəta baş verdi', 'error');
                throw error;
            }
        }

        async function deleteTestCase(id) {
            if (!confirm('Bu test case-i silmək istədiyinizə əminsiniz?')) return;

            try {
                const { error } = await supabase
                    .from('qa_test_cases')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                testCases = testCases.filter(t => t.id !== id);
                renderCategories();
                render();
                showToast('Uğurlu', 'Test case silindi', 'info');
            } catch (error) {
                console.error('Delete error:', error);
                showToast('Xəta', 'Silərkən xəta baş verdi', 'error');
            }
        }

        async function toggleStatus(id) {
            const tc = testCases.find(t => t.id === id);
            if (!tc) return;
            const newStatus = tc.status === 'passed' ? 'not-tested' : 'passed';
            await updateTestCase(id, { status: newStatus });
        }

        async function updateStatus(id, value) {
            await updateTestCase(id, { status: value });
        }

        async function updatePriority(id, value) {
            await updateTestCase(id, { priority: value });
        }

        async function updateBug(id, value) {
            await updateTestCase(id, { bug_id: value || null });
        }

        // ============================================================
        // RENDER CATEGORIES
        // ============================================================
        function renderCategories() {
            const container = document.getElementById('categoryFilter');

            // Remove old category buttons (keep label)
            const label = container.querySelector('.filter-label');
            container.innerHTML = '';
            container.appendChild(label);

            // Add "All" button
            const allCount = testCases.length;
            const allBtn = document.createElement('button');
            allBtn.className = `category-btn ${selectedCategory === 'all' ? 'active' : ''}`;
            allBtn.dataset.category = 'all';
            allBtn.innerHTML = `Hamısı <span class="count">${allCount}</span>`;
            allBtn.onclick = () => selectCategory('all');
            container.appendChild(allBtn);

            // Add category buttons
            categories.forEach(cat => {
                const count = testCases.filter(t => t.category === cat.id).length;
                const btn = document.createElement('button');
                btn.className = `category-btn ${selectedCategory === cat.id ? 'active' : ''}`;
                btn.dataset.category = cat.id;
                btn.innerHTML = `${cat.icon} ${cat.label} <span class="count">${count}</span>`;
                btn.onclick = () => selectCategory(cat.id);
                container.appendChild(btn);
            });
        }

        function selectCategory(category) {
            selectedCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            render();
        }

        // ============================================================
        // RENDER
        // ============================================================
        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');

            let filtered = testCases.filter(tc => {
                const matchSearch = tc.title.toLowerCase().includes(search) ||
                    tc.tc_id.toLowerCase().includes(search) ||
                    (tc.bug_id && tc.bug_id.toLowerCase().includes(search));
                const matchCategory = selectedCategory === 'all' || tc.category === selectedCategory;
                return matchSearch && matchCategory;
            });

            // Stats
            const total = testCases.length;
            const passed = testCases.filter(t => t.status === 'passed').length;
            const failed = testCases.filter(t => t.status === 'failed').length;
            const blocked = testCases.filter(t => t.status === 'blocked').length;
            const retest = testCases.filter(t => t.status === 'retest').length;
            const notTested = testCases.filter(t => t.status === 'not-tested').length;

            document.getElementById('total').textContent = total;
            document.getElementById('passed').textContent = passed;
            document.getElementById('failed').textContent = failed;
            document.getElementById('blocked').textContent = blocked;
            document.getElementById('retest').textContent = retest;
            document.getElementById('notTested').textContent = notTested;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="7">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>Heç bir test case tapılmadı</h3>
                            <p>Yeni test case əlavə etmək üçün "Yeni Test" düyməsinə klikləyin</p>
                        </div>
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(tc => {
                const cat = categories.find(c => c.id === tc.category);
                const icon = cat ? cat.icon : '📌';
                return `
                    <tr>
                        <td>
                            <label class="checkbox-custom">
                                <input type="checkbox" ${tc.status === 'passed' ? 'checked' : ''} 
                                       onchange="toggleStatus('${tc.id}')" />
                                <span class="checkmark"><i class="fas fa-check"></i></span>
                            </label>
                        </td>
                        <td><span class="tc-id">${tc.tc_id}</span></td>
                        <td>
                            <div class="tc-title">
                                ${tc.title}
                                <small>${tc.description || 'Təsvir yoxdur'}</small>
                                <span class="tc-category">${icon} ${tc.category}</span>
                            </div>
                        </td>
                        <td>
                            <select class="td-select" onchange="updateStatus('${tc.id}', this.value)">
                                <option value="not-tested" ${tc.status === 'not-tested' ? 'selected' : ''}>⏳ Edilməyib</option>
                                <option value="passed" ${tc.status === 'passed' ? 'selected' : ''}>✅ Keçdi</option>
                                <option value="failed" ${tc.status === 'failed' ? 'selected' : ''}>❌ Uğursuz</option>
                                <option value="blocked" ${tc.status === 'blocked' ? 'selected' : ''}>🚫 Bloklanıb</option>
                                <option value="retest" ${tc.status === 'retest' ? 'selected' : ''}>🔄 Retest</option>
                            </select>
                        </td>
                        <td>
                            <select class="td-select td-select-priority ${tc.priority}" 
                                    onchange="updatePriority('${tc.id}', this.value)">
                                <option value="critical" ${tc.priority === 'critical' ? 'selected' : ''}>🔴 Critical</option>
                                <option value="high" ${tc.priority === 'high' ? 'selected' : ''}>🟠 High</option>
                                <option value="medium" ${tc.priority === 'medium' ? 'selected' : ''}>🔵 Medium</option>
                                <option value="low" ${tc.priority === 'low' ? 'selected' : ''}>⚪ Low</option>
                            </select>
                        </td>
                        <td>
                            <input class="bug-input" type="text" placeholder="BUG-ID" 
                                   value="${tc.bug_id || ''}" 
                                   onchange="updateBug('${tc.id}', this.value)" />
                        </td>
                        <td>
                            <button class="btn-delete" onclick="deleteTestCase('${tc.id}')" title="Sil">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(title, message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info}"></i>
                <div>
                    <div style="font-weight:600;font-size:14px;">${title}</div>
                    <div style="font-size:13px;color:#6a6a82;">${message}</div>
                </div>
                <button style="background:transparent;border:none;color:#6a6a82;cursor:pointer;font-size:16px;" 
                        onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;

            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 4000);
            }, 4000);
        }

        // ============================================================
        // MODAL
        // ============================================================
        function openModal(data = null) {
            const modal = document.getElementById('modal');
            document.getElementById('editId').value = data ? data.id : '';
            document.getElementById('formTitle').value = data ? data.title : '';
            document.getElementById('formDesc').value = data ? data.description : '';
            document.getElementById('formStatus').value = data ? data.status : 'not-tested';
            document.getElementById('formPriority').value = data ? data.priority : 'medium';
            document.getElementById('formCategory').value = data ? data.category : 'Login / Register';
            document.getElementById('formBug').value = data ? data.bug_id : '';

            document.getElementById('modalTitle').textContent = data ? 'Test Case Redaktə et' : 'Yeni Test Case';
            document.getElementById('modalSubmit').textContent = data ? 'Yenilə' : 'Yarat';
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('addBtn').addEventListener('click', () => openModal());
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('modalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('formTitle').value.trim(),
                description: document.getElementById('formDesc').value.trim(),
                status: document.getElementById('formStatus').value,
                priority: document.getElementById('formPriority').value,
                category: document.getElementById('formCategory').value,
                bug: document.getElementById('formBug').value.trim()
            };

            if (!data.title) {
                showToast('Xəta', 'Başlıq daxil edin!', 'error');
                return;
            }

            try {
                if (id) {
                    await updateTestCase(id, {
                        title: data.title,
                        description: data.description,
                        status: data.status,
                        priority: data.priority,
                        category: data.category,
                        bug_id: data.bug || null
                    });
                } else {
                    await addTestCase(data);
                }
                closeModal();
            } catch (error) {}
        });

        // ============================================================
        // SEARCH & REFRESH
        // ============================================================
        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('refreshBtn').addEventListener('click', loadTestCases);

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.ctrlKey && e.key === 'n') { e.preventDefault();
                openModal(); }
            if (e.ctrlKey && e.key === 'f') { e.preventDefault();
                document.getElementById('searchInput').focus(); }
            if (e.ctrlKey && e.key === 'r') { e.preventDefault();
                loadTestCases(); }
        });

        // ============================================================
        // START
        // ============================================================
        loadTestCases();

        console.log('✅ NaviMax QA Checklist - Kateqoriyalı versiya yükləndi!');
        console.log(`📂 ${categories.length} kateqoriya mövcuddur`);
        console.log('⌨️ Qısayollar: Ctrl+N (Yeni), Ctrl+F (Axtar), Ctrl+R (Yenilə), ESC (Bağla)');
    </script>

</body>
</html>
